spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

# Configuration JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}  # 1 heure en millisecondes
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 jours en millisecondes

gateway:
  internal:
    secret: ${GATEWAY_INTERNAL_SECRET}

service:
  token: ${SERVICE_TOKEN}

app:
  gateway-url: ${GATEWAY_URL}
  profile-images-dir: ${PROFILE_IMAGES_DIR:/tmp/nexaris/uploads/profile-images}
  notification-service-url: ${NOTIFICATION_SERVICE_URL}
  notification-email-endpoint: ${NOTIFICATION_EMAIL_ENDPOINT}

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized

# Resilience4j rate limiter configuration
resilience4j:
  ratelimiter:
    instances:
      login:
        limit-for-period: 5  # Max 5 requests
        limit-refresh-period: 1m  # Per minute
        timeout-duration: 0  # No wait time
        register-health-indicator: true

springdoc:
  api-docs:
    path: /api/v1/auth/api-docs
  swagger-ui:
    path: /api/v1/auth/swagger-ui.html
