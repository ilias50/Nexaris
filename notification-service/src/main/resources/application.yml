spring:
  application:
    name: notification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
          ssl:
            trust: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST:}
  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  gateway-url: ${GATEWAY_URL}

notification:
  mail:
    default-from: ${NOTIFICATION_MAIL_DEFAULT_FROM:no-reply@noreply.local}

gateway:
  internal:
    secret: ${GATEWAY_INTERNAL_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState

springdoc:
  api-docs:
    path: /api/v1/notifications/api-docs
  swagger-ui:
    path: /api/v1/notifications/swagger-ui.html
